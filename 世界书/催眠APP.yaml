      是否中奖需要看实际中奖率, 跳多高看身体能力. 我希望你的输出优先遵循我如下的要求: 保持人设, 逻辑和合理性, 不要强行合理化违背现实逻辑的结果,
      违反现实逻辑的行动会产生跟行动意愿不一样的效果或直接失败. 保持合理性是最优先意愿。'

